name: Build Glance

"on":
  push:
    branches:
      - master
  pull_request:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build macOS app
    runs-on: macos-15

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Show toolchain
        run: |
          sw_vers
          swift --version

      - name: Build app bundle
        run: make clean zip validate

      - name: Publish latest release
        if: github.event_name != 'pull_request' && github.ref == 'refs/heads/master'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git tag --force latest "$GITHUB_SHA"
          git push --force origin latest

          gh release delete latest --yes --cleanup-tag || true
          git tag --force latest "$GITHUB_SHA"
          git push --force origin latest

          gh release create latest dist/Glance.zip \
            --title "Latest Glance Build" \
            --notes "Automated ad hoc signed build from commit $GITHUB_SHA." \
            --latest

      - name: Upload app artifact
        uses: actions/upload-artifact@v4
        with:
          name: Glance-macOS
          path: dist/Glance.zip
          if-no-files-found: error
          retention-days: 14
